name: Sync Upstream

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout our fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/netbirdio/netbird.git
          git fetch upstream main

      - name: Get upstream commit info
        id: upstream
        run: |
          echo "sha=$(git rev-parse upstream/main)" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create sync branch
        run: |
          git checkout -b sync-amneziawg-${{ steps.upstream.outputs.date }} upstream/main

      - name: Apply patches
        id: apply
        run: |
          mkdir -p /tmp/rejected
          FAIL=0
          for patch in patches/*.patch; do
            echo "Applying: $patch"
            if ! git apply --check "$patch" 2>/dev/null; then
              echo "CONFLICT: $patch"
              git apply --reject "$patch" 2>/dev/null || true
              cp *.rej /tmp/rejected/ 2>/dev/null || true
              FAIL=1
              break
            fi
            git apply "$patch"
            git commit -m "Apply: $(basename $patch)

Co-authored-by: Qwen-Coder <qwen-coder@alibabacloud.com>"
          done
          echo "success=$FAIL" >> $GITHUB_OUTPUT

      - name: Update go.mod
        if: steps.apply.outputs.success == '0'
        run: |
          go mod tidy
          git diff --quiet go.mod go.sum || git commit -am "go mod tidy"

      - name: Setup Go
        if: steps.apply.outputs.success == '0'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build verification
        if: steps.apply.outputs.success == '0'
        run: |
          echo "Building Windows client..."
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./client/main.go
          echo "Building Linux amd64 client..."
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build ./client/main.go
          echo "Building Linux arm64 client..."
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./client/main.go

      - name: Push and open PR
        if: steps.apply.outputs.success == '0'
        run: |
          git push origin sync-amneziawg-${{ steps.upstream.outputs.date }} --force
          gh pr create \
            --base amneziawg \
            --head sync-amneziawg-${{ steps.upstream.outputs.date }} \
            --title "Sync upstream ($(date +%Y-%m-%d))" \
            --body "Auto sync from netbirdio/netbird upstream. All patches applied and builds passed."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on patch conflict
        if: steps.apply.outputs.success == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('/tmp/rejected');
            let body = "## Upstream Sync Failed - ${{ steps.upstream.outputs.date }}\n\n**Upstream:** netbirdio/netbird@${{ steps.upstream.outputs.sha }}\n\n### Conflicts in:\n";
            for (const f of files) { body += "- " + f + "\n"; }
            body += "\nResolve conflicts and update patches.";
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Upstream sync failed - ${{ steps.upstream.outputs.date }}",
              body: body
            });

      - name: Open issue on build failure
        if: failure() && steps.apply.outputs.success == '0'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Upstream sync build failed - ${{ steps.upstream.outputs.date }}",
              body: "All patches applied but build failed. Check workflow logs for details."
            });
